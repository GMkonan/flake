name: mini-media

x-default-env: &default-env
  TZ: ${TZ}
  PUID: ${PUID}
  PGID: ${PGID}

x-kyoo-transcoder: &kyoo-transcoder
  image: ghcr.io/zoriya/kyoo_transcoder:4.7
  restart: unless-stopped
  env_file:
    - ./.env
  environment:
    GOCODER_PREFIX: /video
  volumes:
    - ${MEDIA_ROOT}:/video:ro
    - ${KYOO_CACHE_ROOT}:/cache
    - kyoo-metadata:/metadata
  networks:
    - media

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DASH_HOST: ${DASH_HOST}
      PORTAINER_HOST: ${PORTAINER_HOST}
      KYOO_HOST: ${KYOO_HOST}
      QBIT_HOST: ${QBIT_HOST}
      SONARR_HOST: ${SONARR_HOST}
      RADARR_HOST: ${RADARR_HOST}
      BAZARR_HOST: ${BAZARR_HOST}
      PROWLARR_HOST: ${PROWLARR_HOST}
      GLANCES_HOST: ${GLANCES_HOST}
      QBIT_WEBUI_PORT: ${QBIT_WEBUI_PORT}
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${APPDATA_ROOT}/caddy/data:/data
      - ${APPDATA_ROOT}/caddy/config:/config
    networks:
      - media

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${DASH_HOST}
      PUID: ${PUID}
      PGID: ${PGID}
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APPDATA_ROOT}/homepage/images:/app/public/images
    networks:
      - media

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APPDATA_ROOT}/portainer:/data
    networks:
      - media

  glances:
    image: nicolargo/glances:latest-full
    restart: unless-stopped
    pid: host
    environment:
      GLANCES_OPT: "-w"
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - media

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      <<: *default-env
      WEBUI_PORT: ${QBIT_WEBUI_PORT}
      TORRENTING_PORT: ${QBIT_TORRENT_TCP_PORT}
    volumes:
      - ${APPDATA_ROOT}/qbittorrent:/config
      - ${MEDIA_ROOT}/downloads:/downloads
    ports:
      - "${QBIT_TORRENT_TCP_PORT}:${QBIT_TORRENT_TCP_PORT}"
      - "${QBIT_TORRENT_UDP_PORT}:${QBIT_TORRENT_UDP_PORT}/udp"
    networks:
      - media

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    environment:
      <<: *default-env
    volumes:
      - ${APPDATA_ROOT}/prowlarr:/config
    networks:
      - media

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    environment:
      <<: *default-env
    volumes:
      - ${APPDATA_ROOT}/sonarr:/config
      - ${MEDIA_ROOT}/tv:/tv
      - ${MEDIA_ROOT}/downloads:/downloads
    networks:
      - media

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    environment:
      <<: *default-env
    volumes:
      - ${APPDATA_ROOT}/radarr:/config
      - ${MEDIA_ROOT}/movies:/movies
      - ${MEDIA_ROOT}/downloads:/downloads
    networks:
      - media

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    restart: unless-stopped
    environment:
      <<: *default-env
    volumes:
      - ${APPDATA_ROOT}/bazarr:/config
      - ${MEDIA_ROOT}/movies:/movies
      - ${MEDIA_ROOT}/tv:/tv
    networks:
      - media

  kyoo-back:
    image: ghcr.io/zoriya/kyoo_back:4.7
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TRANSCODER_URL: http://kyoo-transcoder:7666/video
      KYOO_PREFIX: /api
    depends_on:
      kyoo-postgres:
        condition: service_healthy
      kyoo-meilisearch:
        condition: service_healthy
      kyoo-rabbitmq:
        condition: service_healthy
      kyoo-migrations:
        condition: service_completed_successfully
    volumes:
      - kyoo:/metadata
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.rule: PathPrefix(`/api/`)
    networks:
      - media

  kyoo-migrations:
    image: ghcr.io/zoriya/kyoo_migrations:4.7
    restart: "no"
    env_file:
      - ./.env
    depends_on:
      kyoo-postgres:
        condition: service_healthy
    networks:
      - media

  kyoo-front:
    image: ghcr.io/zoriya/kyoo_front:4.7
    restart: unless-stopped
    environment:
      KYOO_URL: http://kyoo-back:5000/api
    labels:
      traefik.enable: "true"
      traefik.http.routers.front.rule: PathPrefix(`/`)
    networks:
      - media

  kyoo-scanner:
    image: ghcr.io/zoriya/kyoo_scanner:4.7
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KYOO_URL: http://kyoo-back:5000/api
    depends_on:
      - kyoo-back
    volumes:
      - ${MEDIA_ROOT}:/video:ro
    networks:
      - media

  kyoo-matcher:
    image: ghcr.io/zoriya/kyoo_scanner:4.7
    command: matcher
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KYOO_URL: http://kyoo-back:5000/api
    depends_on:
      - kyoo-back
    networks:
      - media

  kyoo-autosync:
    image: ghcr.io/zoriya/kyoo_autosync:4.7
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      kyoo-rabbitmq:
        condition: service_healthy
    networks:
      - media

  kyoo-transcoder:
    <<: *kyoo-transcoder

  kyoo-traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:8901"
      - "--accesslog=true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - media

  kyoo-postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - kyoo-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - media

  kyoo-meilisearch:
    image: getmeili/meilisearch:v1.4
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MEILI_ENV: production
    volumes:
      - kyoo-search:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://kyoo-meilisearch:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - media

  kyoo-rabbitmq:
    image: rabbitmq:4-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - media

networks:
  media:
    name: mini-media

volumes:
  kyoo:
  kyoo-db:
  kyoo-metadata:
  kyoo-search:
